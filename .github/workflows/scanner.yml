name: spot-scanner

# =============================================================================
#  GitHub Actions ile UCRETSIZ tarama (PC/sunucu gerekmez)
#  Bu dosyanin repodaki yolu:  .github/workflows/scanner.yml
#
#  main.py (futures OI+funding) Binance fapi'nin GitHub Actions IP'lerini
#  HTTP 451 ile engellemesi yuzunden burada CALISTIRILAMIYOR (bkz.
#  DEPLOYMENT_REHBERI.md). Bunun yerine main_spot.py (hacim-rejimi + taker-
#  buy-ratio proxy'li spot-uyarlamasi) calistirilir; data-api.binance.vision
#  mirror'i sayesinde bulut IP'lerinden erisilebiliyor.
#
#  main.py futures botu hala senin kendi PC'nde/agindan calisiyor (Binance
#  orayi engellemiyor) -- iki bot birbirinden bagimsiz, paralel calisir.
#
#  Tetikleme: cron-job.org, asagidaki URL'e duzenli araliklarla POST atarak
#  bu workflow'u calistirir (workflow_dispatch). GitHub'in kendi "schedule:"
#  cron'u KULLANILMIYOR - zamanlama tamamen cron-job.org tarafinda.
#    POST https://api.github.com/repos/<KULLANICI>/<REPO>/actions/workflows/scanner.yml/dispatches
#    Body: {"ref":"main"}
#  (Detaylar: DEPLOYMENT_REHBERI.md)
# =============================================================================

on:
  workflow_dispatch:      # cron-job.org (ve istersen Actions sekmesinden elle) bunu tetikler

# Ayni anda tek calisma olsun (cron-job.org bir onceki tur bitmeden yeni
# istek atarsa, yenisi kuyruga girer/iptal olmaz, cakismaz)
concurrency:
  group: spot-scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Bagimliliklari yukle
        run: pip install -r requirements.txt

      # Cooldown (alarm tekrari onleme), sanal performans VE alarm gecmisi
      # (12 saatlik ozet mesaji icin -- last_summary_ts + son alarmlar)
      # durumunu calismalar arasi tasi -> ayni sinyal her turda tekrar tekrar
      # gonderilmesin, --perf gecmisi birikmeye devam etsin, ozet mesaji
      # gercekten trailing 12 saati gorsun ve ayni pencerede (cron her 15
      # dakikada bir calistigi icin) birden fazla kez gonderilmesin.
      - name: Onceki durumu geri yukle (cooldown + performans + alarm gecmisi)
        uses: actions/cache@v4
        with:
          path: |
            spot_alerts_cache.json
            spot_virtual_trades.json
            spot_alert_log.json
          key: spot-scanner-state-${{ github.run_id }}
          restore-keys: |
            spot-scanner-state-

      - name: Taramayi calistir (tek tur, spot)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ENABLED: "true"
          EXCHANGE_NAME: "binance"
          USE_BINANCE_DATA_MIRROR: "true"
          TIMEFRAMES: "1h,4h"
          VOLUME_SPIKE_STRONG: "40.0"
          VOLUME_SPIKE_WATCH: "20.0"
          VOLUME_WINDOW_STRONG: "60.0"
          VOLUME_WINDOW_WATCH: "30.0"
          VOLUME_WINDOW: "6"
          TAKER_RATIO_EXTREME: "0.15"
          TAKER_RATIO_MODERATE: "0.07"
          MIN_SCORE_STRONG: "75"
          MIN_SCORE_WATCH: "60"
          ALERT_COOLDOWN_MINUTES: "90"
          MAX_CONCURRENCY: "10"
          SSL_VERIFY: "true"
        run: python main_spot.py --once

      # actions/cache save adimi is basarili bitince OTOMATIK calisir
      # (yukaridaki restore adimindan gelen ayni "path" icin); ekstra bir
      # "save" step'ine gerek yok.
